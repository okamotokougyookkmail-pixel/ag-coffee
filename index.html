<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AG COFFEE. — 準備中</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f0eb;
      font-family: 'Georgia', serif;
    }
    .container {
      text-align: center;
      padding: 60px 40px;
    }
    .logo {
      font-size: 28px;
      letter-spacing: 0.2em;
      color: #1a1a1a;
      margin-bottom: 40px;
    }
    .logo span { color: #c0392b; }
    .divider {
      width: 40px;
      height: 1px;
      background: #999;
      margin: 0 auto 40px;
    }
    h1 {
      font-size: 14px;
      letter-spacing: 0.3em;
      color: #666;
      font-weight: normal;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    p {
      font-size: 14px;
      color: #888;
      line-height: 2;
    }
    .contact {
      margin-top: 40px;
      font-size: 13px;
      color: #aaa;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">AG COFFEE<span>.</span></div>
    <div class="divider"></div>
    <h1>Under Maintenance</h1>
    <p>ただいまサイトのメンテナンス中です。<br>近日中に再公開いたします。</p>
    <p class="contact">TEL 075-754-8811</p>
  </div>
</body>
</html>
